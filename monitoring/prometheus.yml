global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  # - "first_rules.yml"
  # - "second_rules.yml"

scrape_configs:
  - job_name: 'fermi-nextjs'
    static_configs:
      - targets: ['nextjs:3000']
    metrics_path: '/api/metrics'
    scrape_interval: 5s

  - job_name: 'fermi-sanity'
    static_configs:
      - targets: ['sanity:3333']
    scrape_interval: 10s

  - job_name: 'prometheus'
    static_configs:
      - targets: ['prometheus:9090']
