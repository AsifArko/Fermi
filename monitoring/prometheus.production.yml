global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  # - "production_rules.yml"

scrape_configs:
  - job_name: 'fermi-nextjs-production'
    static_configs:
      - targets: ['nextjs:3000']
    metrics_path: '/api/metrics'
    scrape_interval: 5s

  - job_name: 'fermi-sanity-production'
    static_configs:
      - targets: ['sanity:3333']
    scrape_interval: 10s

  - job_name: 'prometheus-production'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'grafana-production'
    static_configs:
      - targets: ['grafana:3000']
